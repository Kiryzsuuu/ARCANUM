<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCANUM — Direct Message</title>
  <link rel="stylesheet" href="/css/arcanum.css">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    /* ── Layout ── */
    .dm-wrap { display:flex; flex:1; overflow:hidden; }
    .contacts-panel { width:280px; background:var(--bg-panel); border-right:.5px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
    .chat-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

    /* ── Contacts ── */
    .cp-header { padding:12px 14px 8px; border-bottom:.5px solid var(--border); }
    .cp-title { font-size:13px; font-weight:bold; color:var(--frost); letter-spacing:.06em; margin-bottom:8px; }
    .cp-search { background:var(--bg-app); border:.5px solid var(--border); border-radius:4px; height:30px; display:flex; align-items:center; gap:6px; padding:0 8px; }
    .cp-search input { background:transparent; border:none; outline:none; color:var(--frost); font-family:var(--font); font-size:11px; flex:1; }
    .contact-item { padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; border-bottom:.5px solid rgba(12,68,124,.2); text-decoration:none; }
    .contact-item:hover { background:#070f1c; }
    .contact-item.active { background:var(--deep); border-left:2px solid var(--signal); }
    .c-avatar { width:36px; height:36px; border-radius:50%; background:var(--steel); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:var(--mist); flex-shrink:0; position:relative; }
    .c-avatar .online-ring { position:absolute; bottom:1px; right:1px; width:9px; height:9px; border-radius:50%; background:var(--ops); border:2px solid var(--bg-panel); }
    .c-info { flex:1; min-width:0; }
    .c-name { font-size:12px; color:var(--frost); font-weight:bold; }
    .c-preview { font-size:10px; color:var(--ash); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .c-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
    .c-time { font-size:9px; color:var(--ash); }
    .c-unread { font-size:9px; background:var(--cmd); color:#fff; border-radius:99px; padding:1px 6px; font-weight:bold; min-width:18px; text-align:center; }
    .no-contacts { padding:30px; text-align:center; color:var(--ash); font-size:11px; }

    /* ── Chat header ── */
    .ch-header { background:var(--bg-topbar); border-bottom:.5px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .ch-back { background:none; border:none; color:var(--signal); font-size:18px; cursor:pointer; padding:4px; display:none; }
    .ch-avatar { width:34px; height:34px; border-radius:50%; background:var(--steel); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:var(--frost); flex-shrink:0; }
    .ch-name { font-size:13px; font-weight:bold; color:var(--frost); }
    .ch-status { font-size:10px; color:var(--ops); margin-top:1px; }
    .ch-actions { margin-left:auto; display:flex; gap:6px; }
    .ch-action-btn { width:32px; height:32px; border-radius:50%; background:transparent; border:.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ash); font-size:16px; }
    .ch-action-btn:hover { color:var(--signal); border-color:var(--cmd); background:var(--deep); }

    /* ── Messages ── */
    .messages { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:6px; }
    .date-divider { text-align:center; font-size:9px; color:var(--ash); padding:8px 0; letter-spacing:.08em; }
    .msg-row { display:flex; align-items:flex-end; gap:6px; }
    .msg-row.self { flex-direction:row-reverse; }
    .msg-bubble-wrap { max-width:68%; display:flex; flex-direction:column; }
    .msg-row.self .msg-bubble-wrap { align-items:flex-end; }
    .bubble { border-radius:12px; padding:8px 12px; font-size:12px; line-height:1.5; position:relative; word-break:break-word; }
    .bubble.other { background:#0d1d33; border:.5px solid var(--border); color:#B5D4F4; border-bottom-left-radius:2px; }
    .bubble.self  { background:#1a3a60; border:.5px solid var(--cmd); color:var(--frost); border-bottom-right-radius:2px; }
    .bubble-time { font-size:9px; color:var(--steel); margin-top:3px; display:flex; align-items:center; gap:4px; }
    .msg-row.self .bubble-time { justify-content:flex-end; }
    .read-tick { font-size:10px; color:var(--signal); }
    .msg-img { max-width:240px; max-height:220px; border-radius:8px; cursor:pointer; object-fit:cover; display:block; }
    .msg-video { max-width:240px; border-radius:8px; display:block; }
    /* ── Custom Voice Note Player ── */
    .vn-player { display:flex; align-items:center; gap:8px; background:var(--bg-app); border:.5px solid var(--border); border-radius:20px; padding:6px 12px 6px 8px; min-width:200px; max-width:260px; }
    .vn-play-btn { width:32px; height:32px; border-radius:50%; background:var(--cmd); border:none; color:var(--frost); font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .15s; }
    .vn-play-btn:hover { background:var(--signal); }
    .vn-play-btn.playing { background:var(--signal); }
    .vn-body { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
    .vn-waveform { height:24px; display:flex; align-items:center; gap:1.5px; overflow:hidden; }
    .vn-bar { width:2.5px; border-radius:2px; background:var(--border); transition:background .1s; flex-shrink:0; }
    .vn-bar.played { background:var(--cmd); }
    .vn-bar.active { background:var(--signal); }
    .vn-time { font-size:9px; color:var(--ash); font-family:var(--font); letter-spacing:.04em; }
    .msg-row.self .vn-player { background:var(--deep); border-color:var(--cmd); }
    .msg-row.self .vn-play-btn { background:var(--signal); }
    .msg-row.self .vn-bar.played { background:var(--signal); }
    .msg-row.self .vn-time { color:var(--ops); }
    .msg-file { display:flex; align-items:center; gap:8px; padding:4px 0; }
    .msg-file-icon { width:32px; height:32px; border-radius:6px; background:var(--steel); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--mist); flex-shrink:0; }
    .msg-file-info .name { font-size:11px; color:var(--frost); font-weight:bold; }
    .msg-file-info .size { font-size:9px; color:var(--ash); }
    .msg-deleted { font-style:italic; color:var(--ash); font-size:11px; }
    .ctx-menu { position:fixed; background:var(--bg-panel); border:.5px solid var(--border); border-radius:6px; z-index:500; min-width:140px; box-shadow:0 4px 20px rgba(0,0,0,.5); }
    .ctx-item { padding:9px 14px; font-size:11px; color:var(--mist); cursor:pointer; display:flex; align-items:center; gap:8px; }
    .ctx-item:hover { background:var(--deep); }
    .ctx-item.danger { color:var(--threat); }

    /* ── Empty / no chat ── */
    .no-chat { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--ash); }
    .no-chat i { font-size:48px; color:var(--steel); }
    .no-chat p { font-size:12px; }

    /* ── Typing indicator ── */
    .typing-indicator { padding:6px 16px; font-size:10px; color:var(--signal); min-height:20px; flex-shrink:0; }

    /* ── Input area ── */
    .input-wrap { background:var(--bg-topbar); border-top:.5px solid var(--border); padding:8px 12px; flex-shrink:0; }

    /* Attachment preview above input */
    .attach-preview-bar { display:none; background:var(--deep); border:.5px solid var(--cmd); border-radius:8px; padding:8px 10px; margin-bottom:8px; display:none; align-items:center; gap:10px; }
    .attach-preview-bar.show { display:flex; }
    .ap-thumb { max-height:60px; max-width:80px; border-radius:4px; object-fit:cover; }
    .ap-info { flex:1; min-width:0; }
    .ap-name { font-size:11px; color:var(--frost); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ap-size { font-size:9px; color:var(--ash); margin-top:2px; }
    .ap-clear { background:none; border:none; color:var(--threat); font-size:16px; cursor:pointer; padding:4px; flex-shrink:0; }
    /* Recording bar */
    .rec-bar { display:none; background:rgba(226,75,74,.1); border:.5px solid var(--threat); border-radius:8px; padding:8px 10px; margin-bottom:8px; align-items:center; gap:10px; }
    .rec-bar.show { display:flex; }
    .rec-dot { width:8px; height:8px; border-radius:50%; background:var(--threat); animation:pulse 1s infinite; flex-shrink:0; }
    .rec-timer { font-size:12px; color:var(--threat); font-weight:bold; font-family:var(--font); flex:1; }
    .rec-cancel { background:none; border:none; color:var(--ash); font-size:14px; cursor:pointer; }

    /* Input row */
    .input-row { display:flex; align-items:flex-end; gap:6px; }
    .input-btn { width:36px; height:36px; border-radius:50%; background:transparent; border:none; cursor:pointer; color:var(--ash); font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:color .15s; }
    .input-btn:hover { color:var(--signal); }
    .input-btn.active { color:var(--signal); }
    .input-btn.recording { color:var(--threat); animation:pulse 1s infinite; }
    .msg-textarea { flex:1; background:var(--bg-input); border:.5px solid var(--cmd); border-radius:20px; padding:9px 14px; font-size:12px; color:var(--frost); font-family:var(--font); outline:none; resize:none; max-height:120px; overflow-y:auto; line-height:1.4; }
    .msg-textarea:focus { border-color:var(--signal); }
    .msg-textarea::placeholder { color:var(--ash); }
    .send-btn { width:38px; height:38px; border-radius:50%; background:var(--cmd); border:none; cursor:pointer; color:var(--frost); font-size:17px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s; }
    .send-btn:hover { background:var(--signal); }
    .send-btn:disabled { background:var(--steel); cursor:not-allowed; }

    /* Attach menu popup */
    .attach-popup { position:absolute; bottom:64px; left:50px; background:var(--bg-panel); border:.5px solid var(--border); border-radius:10px; padding:8px; z-index:300; display:none; flex-direction:column; gap:4px; min-width:160px; box-shadow:0 4px 20px rgba(0,0,0,.5); }
    .attach-popup.show { display:flex; }
    .attach-opt { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; cursor:pointer; font-size:11px; color:var(--mist); }
    .attach-opt:hover { background:var(--deep); color:var(--frost); }
    .attach-opt-icon { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }

    /* ── Emoji Picker ── */
    .emoji-picker { position:absolute; bottom:64px; left:50%; transform:translateX(-50%); background:var(--bg-panel); border:.5px solid var(--border); border-radius:12px; z-index:400; display:none; flex-direction:column; width:320px; max-width:calc(100vw - 24px); box-shadow:0 8px 32px rgba(0,0,0,.6); }
    .emoji-picker.show { display:flex; }
    .ep-tabs { display:flex; border-bottom:.5px solid var(--border); padding:6px 8px 0; gap:4px; }
    .ep-tab { background:none; border:none; cursor:pointer; padding:5px 8px; border-radius:6px 6px 0 0; font-size:16px; opacity:.5; border-bottom:2px solid transparent; }
    .ep-tab.active { opacity:1; border-bottom-color:var(--signal); }
    .ep-search { margin:6px 8px 4px; background:var(--bg-input); border:.5px solid var(--border); border-radius:6px; padding:5px 10px; font-size:11px; color:var(--frost); font-family:var(--font); outline:none; width:calc(100% - 16px); }
    .ep-search::placeholder { color:var(--ash); }
    .ep-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:2px; padding:6px 8px 8px; max-height:200px; overflow-y:auto; }
    .ep-emoji { font-size:20px; cursor:pointer; padding:4px; border-radius:6px; text-align:center; line-height:1; transition:background .1s; }
    .ep-emoji:hover { background:var(--deep); }

    /* ── Image lightbox ── */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:1000; display:none; align-items:center; justify-content:center; }
    .lightbox.show { display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; object-fit:contain; }
    .lightbox-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.1); border:none; color:#fff; font-size:22px; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

    /* ── Mobile ── */
    @media (max-width:640px) {
      .contacts-panel { width:100%; position:absolute; inset:0; top:40px; bottom:52px; z-index:10; transition:transform .25s; }
      .contacts-panel.hidden { transform:translateX(-100%); }
      .chat-panel { position:absolute; inset:0; top:40px; bottom:52px; transform:translateX(100%); transition:transform .25s; }
      .chat-panel.show { transform:translateX(0); }
      .ch-back { display:flex !important; }
      .emoji-picker { bottom:52px; }
      .attach-popup { bottom:52px; left:12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Topbar -->
    <div class="topbar">
      <div class="flex items-center gap-8">
        <div class="tb-brand"><div class="tb-icon"><i class="ti ti-lock" aria-hidden="true"></i></div><span class="tb-name">ARCANUM</span></div>
        <div class="tb-sep"></div>
        <span class="tb-path">DIRECT MESSAGE</span>
      </div>
      <div class="tb-right">
        <div class="tb-item"><span class="live-dot"></span> ENC: ACTIVE</div>
        <div class="tb-item"><i class="ti ti-clock" aria-hidden="true"></i> <span id="utc-clock"></span></div>
        <div class="avatar" id="user-initials">--</div>
      </div>
    </div>

    <div class="body">
      <!-- Sidebar nav -->
      <nav class="sidebar">
        <a href="/dashboard" class="nav-btn" title="Dashboard"><i class="ti ti-layout-dashboard"></i></a>
        <a href="/channels"  class="nav-btn" title="Channels"><i class="ti ti-messages"></i></a>
        <a href="/dm"        class="nav-btn active" title="Direct Message"><i class="ti ti-message-2"></i></a>
        <a href="/grid"      class="nav-btn" title="Grid"><i class="ti ti-map-pin"></i></a>
        <a href="/sitrep"    class="nav-btn" title="Sitrep"><i class="ti ti-file-report"></i></a>
        <a href="/operators" class="nav-btn" title="Operators"><i class="ti ti-users"></i></a>
        <a href="/logs"        class="nav-btn" title="Activity Log"><i class="ti ti-list-details"></i></a>
        <div class="nav-sep"></div>
        <a href="/logout"    class="nav-btn" title="Logout"><i class="ti ti-logout"></i></a>
      </nav>

      <div class="dm-wrap" style="position:relative;flex:1;overflow:hidden;">
        <!-- Contacts Panel -->
        <div class="contacts-panel" id="contacts-panel">
          <div class="cp-header">
            <div class="cp-title">Direct Messages</div>
            <div class="cp-search">
              <i class="ti ti-search" style="font-size:12px;color:var(--ash);"></i>
              <input type="text" placeholder="Search operators..." id="op-search" oninput="filterContacts()">
            </div>
          </div>
          <div style="flex:1;overflow-y:auto;" id="contacts-list">
            <div class="no-contacts">Loading operators...</div>
          </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel" id="chat-panel">
          <div class="no-chat" id="no-chat">
            <i class="ti ti-message-2"></i>
            <p>Select an operator to start a secure conversation</p>
          </div>

          <!-- Active chat (hidden until contact selected) -->
          <div id="active-chat" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;height:100%;">
            <!-- Header -->
            <div class="ch-header">
              <button class="ch-back" id="back-btn" onclick="backToContacts()"><i class="ti ti-arrow-left"></i></button>
              <div class="ch-avatar" id="chat-avatar">--</div>
              <div style="flex:1;min-width:0;">
                <div class="ch-name" id="chat-name">—</div>
                <div class="ch-status" id="chat-status">online</div>
              </div>
              <div class="ch-actions">
                <div class="ch-action-btn" title="Call" onclick="alert('Voice call — coming soon')"><i class="ti ti-phone"></i></div>
                <div class="ch-action-btn" title="Search" onclick="alert('Search in conversation — coming soon')"><i class="ti ti-search"></i></div>
              </div>
            </div>

            <!-- Messages -->
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typing-indicator"></div>

            <!-- Input area -->
            <div class="input-wrap" style="position:relative;">
              <!-- Attachment preview -->
              <div class="attach-preview-bar" id="attach-preview-bar">
                <div id="ap-preview-content" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;"></div>
                <button class="ap-clear" onclick="clearAttachment()" title="Remove"><i class="ti ti-x"></i></button>
              </div>
              <!-- Recording bar -->
              <div class="rec-bar" id="rec-bar">
                <div class="rec-dot"></div>
                <span class="rec-timer" id="rec-timer">0:00</span>
                <span style="font-size:10px;color:var(--ash);">Recording...</span>
                <button class="rec-cancel" onclick="cancelRecording()" title="Cancel"><i class="ti ti-x"></i></button>
              </div>
              <!-- Input row -->
              <div class="input-row">
                <button class="input-btn" id="emoji-btn" onclick="toggleEmojiPicker(event)" title="Emoji"><i class="ti ti-mood-smile"></i></button>
                <button class="input-btn" id="attach-btn" onclick="toggleAttachMenu(event)" title="Attach"><i class="ti ti-paperclip"></i></button>
                <textarea class="msg-textarea" id="dm-input" placeholder="Message..." rows="1"
                  oninput="autoResize(this);handleTyping()"
                  onkeydown="handleKey(event)"></textarea>
                <button class="input-btn" id="mic-btn" onclick="toggleRecording()" title="Voice note"><i class="ti ti-microphone"></i></button>
                <button class="send-btn" id="send-btn" onclick="sendDM()" title="Send"><i class="ti ti-send"></i></button>
              </div>

              <!-- Attach popup -->
              <div class="attach-popup" id="attach-popup">
                <div class="attach-opt" onclick="attachMedia('image/*')">
                  <div class="attach-opt-icon" style="background:#1a3a60;"><i class="ti ti-photo" style="color:#378ADD;"></i></div>
                  <span>Image / Photo</span>
                </div>
                <div class="attach-opt" onclick="attachMedia('video/*')">
                  <div class="attach-opt-icon" style="background:#1a2a0a;"><i class="ti ti-video" style="color:#639922;"></i></div>
                  <span>Video</span>
                </div>
                <div class="attach-opt" onclick="attachMedia('audio/*')">
                  <div class="attach-opt-icon" style="background:#2a1a0a;"><i class="ti ti-music" style="color:#EF9F27;"></i></div>
                  <span>Audio</span>
                </div>
                <div class="attach-opt" onclick="attachMedia('*/*')">
                  <div class="attach-opt-icon" style="background:#1a0a2a;"><i class="ti ti-file" style="color:#85B7EB;"></i></div>
                  <span>File / Document</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile nav -->
    <nav class="mobile-nav">
      <a href="/dashboard"><i class="ti ti-layout-dashboard"></i><span>DASH</span></a>
      <a href="/channels"><i class="ti ti-messages"></i><span>COMMS</span></a>
      <a href="/dm" class="active"><i class="ti ti-message-2"></i><span>DM</span></a>
      <a href="/sitrep"><i class="ti ti-file-report"></i><span>SITREP</span></a>
      <a href="/operators"><i class="ti ti-users"></i><span>OPS</span></a>
    </nav>
  </div>

  <!-- Emoji picker (outside input-wrap for correct positioning) -->
  <div class="emoji-picker" id="emoji-picker">
    <div class="ep-tabs">
      <button class="ep-tab active" data-cat="smileys" onclick="switchEmojiCat('smileys',this)">&#128512;</button>
      <button class="ep-tab" data-cat="gestures" onclick="switchEmojiCat('gestures',this)">&#128077;</button>
      <button class="ep-tab" data-cat="hearts" onclick="switchEmojiCat('hearts',this)">&#10084;&#65039;</button>
      <button class="ep-tab" data-cat="objects" onclick="switchEmojiCat('objects',this)">&#127881;</button>
    </div>
    <input class="ep-search" type="text" placeholder="Search emoji..." id="ep-search" oninput="searchEmoji(this.value)">
    <div class="ep-grid" id="ep-grid"></div>
  </div>

  <!-- Image lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button>
    <img id="lightbox-img" src="" alt="preview">
  </div>

  <!-- Context menu -->
  <div class="ctx-menu" id="ctx-menu" style="display:none;">
    <div class="ctx-item" id="ctx-copy" onclick="ctxCopy()"><i class="ti ti-copy" style="font-size:14px;"></i> Copy</div>
    <div class="ctx-item danger" id="ctx-delete" onclick="ctxDelete()"><i class="ti ti-trash" style="font-size:14px;"></i> Delete</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/arcanum.js"></script>
  <script>
  // ══════════════════════════════════════════════
  //  EMOJI DATA
  // ══════════════════════════════════════════════
  const EMOJI_CATS = {
    smileys: ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','😉','😌','😍','🥰','😘','😗','😙','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🥸','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😑','😬','🙄','😯','😦','😧','😮','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','💀','☠️','👻','👽','👾','🤖','💩'],
    gestures: ['👋','🤚','🖐','✋','🖖','👌','🤌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','🤝','👏','🙌','👐','🤲','🙏','✍️','💅','🤳','💪','🦾','🦵','🦶','👂','🦻','👃','👀','👁','👅','👄'],
    hearts: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','♥️','💋','💯','✨','⭐','🌟','💫','🔥','💥','❗','❓','💢','💨','💦','💤'],
    objects: ['🎉','🎊','🎈','🎁','🏆','🥇','🎯','🎮','🎲','🎨','🎭','🎬','🎤','🎵','🎶','🎸','🎹','🎺','🎻','🥁','🔔','🔕','📱','💻','🖥️','📷','📸','📹','🎥','📺','📡','🔋','💡','🔦','🔑','🗝️','🔒','🔓','💌','📩','📧','📨','✉️','📝','📋','🗒️','📅','📌','📍','✅','❌','⚡','🌈','🌊','🌸','🌺','🍕','🍔','🍣','🍜','☕','🍺','🥂','🚀','✈️','🚗','🏠','🌍'],
  };
  let currentEmojiCat = 'smileys';

  // ══════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════
  let currentUser   = null;
  let currentContact= null;   // { id, name, role, clearance }
  let allOperators  = [];
  let conversations = {};     // operatorId -> { unread, lastMessage, lastTime }
  let pendingAttachment = null;
  let mediaRecorder = null;
  let audioChunks   = [];
  let recInterval   = null;
  let recSeconds    = 0;
  let typingTimeout = null;
  let ctxTarget     = null;   // currently context-menu'd message
  const socket = io();

  // ══════════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════════
  async function init() {
    currentUser = await initTopbar('DIRECT MESSAGE');
    socket.emit('register', currentUser.id);
    renderEmojiGrid(EMOJI_CATS.smileys);
    await loadOperators();
    await loadConversations();

    // Open DM from URL if present
    const parts = location.pathname.split('/');
    if (parts[1] === 'dm' && parts[2]) openChat(parts[2]);

    // Socket events
    socket.on('dm-receive', onDMReceive);
    socket.on('dm-sent', onDMSent);
    socket.on('dm-typing', ({ from }) => {
      if (currentContact && from === currentContact.id) showTyping();
    });
    socket.on('dm-read-ack', () => updateReadTicks());
  }

  // ══════════════════════════════════════════════
  //  OPERATORS / CONVERSATIONS
  // ══════════════════════════════════════════════
  async function loadOperators() {
    allOperators = (await api('/api/operators')).filter(o => o.id !== currentUser.id);
  }

  async function loadConversations() {
    const convs = await api('/api/dm/conversations');
    conversations = {};
    convs.forEach(c => { conversations[c.with] = c; });
    renderContacts();
  }

  function renderContacts(filter = '') {
    const list = document.getElementById('contacts-list');
    const q = filter.toLowerCase();
    const ops = allOperators.filter(o => !q || o.name.toLowerCase().includes(q) || o.id.toLowerCase().includes(q));
    if (!ops.length) { list.innerHTML = '<div class="no-contacts">No operators found</div>'; return; }

    const ROLE_BG = { CMD:'#0a1f38', OPS:'#0a1f0a', RECON:'#1f1a0a', INTEL:'#1a0a1f', LOG:'#1a1a1a' };
    const ROLE_COLOR = { CMD:'#378ADD', OPS:'#639922', RECON:'#EF9F27', INTEL:'#85B7EB', LOG:'#444441' };

    list.innerHTML = ops.map(op => {
      const conv = conversations[op.id] || {};
      const unread = conv.unread || 0;
      const preview = conv.lastMessage
        ? (conv.lastType !== 'text' ? `[${conv.lastType}]` : (conv.lastMessage.length > 28 ? conv.lastMessage.slice(0,28)+'…' : conv.lastMessage))
        : op.role + ' · LVL ' + op.clearance;
      const timeStr = conv.lastTime ? fmtTime(conv.lastTime) : '';
      const initials = op.name.slice(0,2).toUpperCase();
      const bg = ROLE_BG[op.role] || '#0a1a2a';
      const clr = ROLE_COLOR[op.role] || '#85B7EB';
      const isActive = currentContact && currentContact.id === op.id;
      return `
        <div class="contact-item${isActive?' active':''}" data-id="${op.id}" onclick="openChat('${op.id}')">
          <div class="c-avatar" style="background:${bg};color:${clr};">${initials}
            <div class="online-ring"></div>
          </div>
          <div class="c-info">
            <div class="c-name">${op.name}</div>
            <div class="c-preview">${preview}</div>
          </div>
          <div class="c-meta">
            ${timeStr ? `<span class="c-time">${timeStr}</span>` : ''}
            ${unread ? `<span class="c-unread">${unread}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function filterContacts() {
    renderContacts(document.getElementById('op-search').value);
  }

  // ══════════════════════════════════════════════
  //  OPEN / CLOSE CHAT
  // ══════════════════════════════════════════════
  async function openChat(operatorId) {
    const op = allOperators.find(o => o.id === operatorId);
    if (!op) return;
    currentContact = op;

    // Mobile: slide contacts out, chat in
    document.getElementById('contacts-panel').classList.add('hidden');
    document.getElementById('chat-panel').classList.add('show');

    // Update header
    const ROLE_BG   = { CMD:'#0a1f38', OPS:'#0a1f0a', RECON:'#1f1a0a', INTEL:'#1a0a1f', LOG:'#1a1a1a' };
    const ROLE_COLOR= { CMD:'#378ADD', OPS:'#639922', RECON:'#EF9F27', INTEL:'#85B7EB', LOG:'#444441' };
    document.getElementById('chat-avatar').textContent = op.name.slice(0,2).toUpperCase();
    document.getElementById('chat-avatar').style.background = ROLE_BG[op.role]||'#0a1a2a';
    document.getElementById('chat-avatar').style.color = ROLE_COLOR[op.role]||'#85B7EB';
    document.getElementById('chat-name').textContent = op.name;
    document.getElementById('chat-status').textContent = op.role + ' · LVL ' + op.clearance + ' · encrypted';

    document.getElementById('no-chat').style.display = 'none';
    const ac = document.getElementById('active-chat');
    ac.style.display = 'flex';

    // Mark active in contacts
    document.querySelectorAll('.contact-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === operatorId);
    });
    // Clear unread
    if (conversations[operatorId]) conversations[operatorId].unread = 0;
    renderContacts(document.getElementById('op-search').value);

    // Load messages
    await loadMessages(operatorId);
    socket.emit('dm-read', { from: operatorId });
  }

  function backToContacts() {
    document.getElementById('contacts-panel').classList.remove('hidden');
    document.getElementById('chat-panel').classList.remove('show');
    currentContact = null;
  }

  // ══════════════════════════════════════════════
  //  LOAD MESSAGES
  // ══════════════════════════════════════════════
  async function loadMessages(operatorId) {
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ash);font-size:11px;">Loading...</div>';
    const data = await api('/api/dm/' + operatorId);
    msgs.innerHTML = '';

    let lastDate = '';
    data.forEach(msg => {
      const d = new Date(msg.createdAt).toDateString();
      if (d !== lastDate) {
        lastDate = d;
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.textContent = formatDateLabel(msg.createdAt);
        msgs.appendChild(div);
      }
      appendMsg(msg, false);
    });
    scrollBottom();
  }

  // ══════════════════════════════════════════════
  //  RENDER A MESSAGE
  // ══════════════════════════════════════════════
  function appendMsg(msg, scroll = true) {
    const isSelf = msg.from === currentUser.id;
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg-row' + (isSelf ? ' self' : '');
    wrap.dataset.id = msg._id;
    wrap.dataset.msg = msg.message || '';

    wrap.innerHTML = `
      <div class="msg-bubble-wrap">
        <div class="bubble ${isSelf?'self':'other'}" oncontextmenu="showCtxMenu(event,'${msg._id}','${isSelf}')">
          ${renderMsgContent(msg)}
        </div>
        <div class="bubble-time">
          <span>${fmtTime(msg.createdAt)}</span>
          ${isSelf ? `<span class="read-tick" id="tick-${msg._id}"><i class="ti ti-checks"></i></span>` : ''}
        </div>
      </div>`;
    msgs.appendChild(wrap);
    if (scroll) scrollBottom();
  }

  function renderMsgContent(msg) {
    if (msg.type === 'image') {
      return `<img class="msg-img" src="${escH(msg.fileUrl)}" alt="${escH(msg.fileName||'image')}" onclick="openLightbox('${escH(msg.fileUrl)}')">
              ${msg.message ? `<div style="margin-top:4px;">${escH(msg.message)}</div>` : ''}`;
    }
    if (msg.type === 'video') {
      return `<video class="msg-video" src="${escH(msg.fileUrl)}" controls></video>
              ${msg.message ? `<div style="margin-top:4px;">${escH(msg.message)}</div>` : ''}`;
    }
    if (msg.type === 'audio') {
      const dur = msg.duration || 0;
      const id  = 'vn-' + Math.random().toString(36).slice(2,8);
      // Generate fake waveform bars (30 bars, random heights)
      const seed = (msg._id||msg.fileUrl||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      const bars = Array.from({length:30}, (_,i) => {
        const h = 4 + Math.round(Math.abs(Math.sin((seed + i * 7) * 0.4)) * 18);
        return `<div class="vn-bar" id="${id}-b${i}" style="height:${h}px;"></div>`;
      }).join('');
      return `<div class="vn-player" id="${id}">
        <button class="vn-play-btn" id="${id}-btn" onclick="vnToggle('${id}','${escH(msg.fileUrl)}',${dur})" title="Play">
          <i class="ti ti-player-play-filled" id="${id}-icon"></i>
        </button>
        <div class="vn-body">
          <div class="vn-waveform">${bars}</div>
          <span class="vn-time" id="${id}-time">${fmtDur(dur)}</span>
        </div>
      </div>`;
    }
    if (msg.type === 'file') {
      return `<a href="${escH(msg.fileUrl)}" download="${escH(msg.fileName||'file')}" style="text-decoration:none;">
                <div class="msg-file">
                  <div class="msg-file-icon"><i class="ti ti-file-download"></i></div>
                  <div class="msg-file-info">
                    <div class="name">${escH(msg.fileName||'File')}</div>
                    <div class="size">${fmtSize(msg.fileSize)} · tap to download</div>
                  </div>
                </div>
              </a>
              ${msg.message ? `<div style="margin-top:4px;">${escH(msg.message)}</div>` : ''}`;
    }
    // text — linkify URLs
    return linkify(escH(msg.message || ''));
  }

  // ══════════════════════════════════════════════
  //  SEND DM
  // ══════════════════════════════════════════════
  async function sendDM() {
    if (!currentContact) return;
    const inp = document.getElementById('dm-input');
    const text = inp.value.trim();

    if (pendingAttachment) {
      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      try {
        const formData = new FormData();
        formData.append('to', currentContact.id);
        if (text) formData.append('message', text);

        if (pendingAttachment.blob) {
          // Voice note — get extension from mime
          const mimeType = pendingAttachment.mimeType || 'audio/webm';
          const ext = mimeType.includes('ogg') ? '.ogg' : mimeType.includes('mp4') ? '.mp4' : '.webm';
          formData.append('file', pendingAttachment.blob, 'voice-note' + ext);
          formData.append('type', 'audio');
        } else {
          formData.append('file', pendingAttachment.file);
          formData.append('type', pendingAttachment.type);
        }

        const res = await fetch('/api/dm/upload', { method: 'POST', body: formData });
        const dm  = await res.json();
        if (dm._id) {
          appendMsg(dm);
          updateConversationPreview(dm);
        }
      } finally {
        btn.disabled = false;
      }
      clearAttachment();
      inp.value = '';
      autoResize(inp);
      return;
    }

    if (!text) return;
    socket.emit('dm-send', { to: currentContact.id, message: text, type: 'text' });
    inp.value = '';
    autoResize(inp);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDM(); }
  }

  // Received my own message back (confirmed sent)
  function onDMSent(msg) {
    appendMsg(msg);
    updateConversationPreview(msg);
  }

  // Received message from another user
  function onDMReceive(msg) {
    if (currentContact && msg.from === currentContact.id) {
      appendMsg(msg);
      socket.emit('dm-read', { from: msg.from });
    } else {
      // Increment unread
      if (!conversations[msg.from]) conversations[msg.from] = { unread: 0 };
      conversations[msg.from].unread = (conversations[msg.from].unread || 0) + 1;
      conversations[msg.from].lastMessage = msg.message;
      conversations[msg.from].lastType = msg.type;
      conversations[msg.from].lastTime = msg.createdAt;
    }
    renderContacts(document.getElementById('op-search').value);
  }

  function updateConversationPreview(msg) {
    const other = msg.from === currentUser.id ? msg.to : msg.from;
    if (!conversations[other]) conversations[other] = { unread: 0 };
    conversations[other].lastMessage = msg.message;
    conversations[other].lastType = msg.type;
    conversations[other].lastTime = msg.createdAt;
    renderContacts(document.getElementById('op-search').value);
  }

  function updateReadTicks() {
    document.querySelectorAll('.read-tick').forEach(el => {
      el.style.color = 'var(--signal)';
    });
  }

  // ══════════════════════════════════════════════
  //  TYPING INDICATOR
  // ══════════════════════════════════════════════
  function handleTyping() {
    if (!currentContact) return;
    socket.emit('dm-typing', { to: currentContact.id });
  }

  let typingVisible = false;
  function showTyping() {
    const el = document.getElementById('typing-indicator');
    el.textContent = (currentContact?.name || '') + ' is typing...';
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { el.textContent = ''; }, 2500);
  }

  // ══════════════════════════════════════════════
  //  EMOJI PICKER
  // ══════════════════════════════════════════════
  function renderEmojiGrid(emojis) {
    const grid = document.getElementById('ep-grid');
    grid.innerHTML = emojis.map(e =>
      `<span class="ep-emoji" onclick="insertEmoji('${e}')" title="${e}">${e}</span>`
    ).join('');
  }

  function switchEmojiCat(cat, btn) {
    currentEmojiCat = cat;
    document.querySelectorAll('.ep-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('ep-search').value = '';
    renderEmojiGrid(EMOJI_CATS[cat]);
  }

  function searchEmoji(q) {
    if (!q) { renderEmojiGrid(EMOJI_CATS[currentEmojiCat]); return; }
    const all = Object.values(EMOJI_CATS).flat();
    // Simple: just show all (no text search without data — show all emojis filtered by inclusion)
    renderEmojiGrid(all.filter(e => e.includes(q)));
  }

  function insertEmoji(emoji) {
    const inp = document.getElementById('dm-input');
    const pos = inp.selectionStart;
    const val = inp.value;
    inp.value = val.slice(0, pos) + emoji + val.slice(inp.selectionEnd);
    inp.selectionStart = inp.selectionEnd = pos + emoji.length;
    inp.focus();
    autoResize(inp);
  }

  function toggleEmojiPicker(e) {
    e.stopPropagation();
    closeAttachMenu();
    const picker = document.getElementById('emoji-picker');
    picker.classList.toggle('show');
    positionPopup(picker, document.getElementById('emoji-btn'));
  }

  function positionPopup(popup, anchor) {
    const rect = anchor.getBoundingClientRect();
    const pickerH = 280;
    const top = rect.top - pickerH - 8;
    const left = Math.max(8, Math.min(rect.left - 140, window.innerWidth - 328));
    popup.style.position = 'fixed';
    popup.style.top = Math.max(8, top) + 'px';
    popup.style.left = left + 'px';
    popup.style.bottom = 'auto';
    popup.style.transform = 'none';
  }

  // ══════════════════════════════════════════════
  //  ATTACH MENU
  // ══════════════════════════════════════════════
  function toggleAttachMenu(e) {
    e.stopPropagation();
    closeEmojiPicker();
    const menu = document.getElementById('attach-popup');
    menu.classList.toggle('show');
    positionPopup(menu, document.getElementById('attach-btn'));
  }
  function closeAttachMenu() { document.getElementById('attach-popup').classList.remove('show'); }
  function closeEmojiPicker() { document.getElementById('emoji-picker').classList.remove('show'); }

  function attachMedia(accept) {
    closeAttachMenu();
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = accept;
    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      let type = 'file';
      if (file.type.startsWith('image/')) type = 'image';
      else if (file.type.startsWith('video/')) type = 'video';
      else if (file.type.startsWith('audio/')) type = 'audio';
      pendingAttachment = { file, type, mimeType: file.type };
      showAttachPreview(file, type);
    };
    input.click();
  }

  function showAttachPreview(file, type) {
    const bar = document.getElementById('attach-preview-bar');
    const content = document.getElementById('ap-preview-content');
    const url = URL.createObjectURL(file);

    let previewHtml = '';
    if (type === 'image') {
      previewHtml = `<img class="ap-thumb" src="${url}">`;
    } else if (type === 'video') {
      previewHtml = `<i class="ti ti-video" style="font-size:28px;color:var(--ops);flex-shrink:0;"></i>`;
    } else if (type === 'audio') {
      previewHtml = `<i class="ti ti-music" style="font-size:28px;color:var(--siaga);flex-shrink:0;"></i>`;
    } else {
      previewHtml = `<i class="ti ti-file" style="font-size:28px;color:var(--signal);flex-shrink:0;"></i>`;
    }

    content.innerHTML = `
      ${previewHtml}
      <div class="ap-info">
        <div class="ap-name">${escH(file.name)}</div>
        <div class="ap-size">${fmtSize(file.size)} · ${type}</div>
      </div>`;
    bar.classList.add('show');
  }

  function clearAttachment() {
    pendingAttachment = null;
    document.getElementById('attach-preview-bar').classList.remove('show');
    document.getElementById('ap-preview-content').innerHTML = '';
  }

  // ══════════════════════════════════════════════
  //  VOICE NOTE
  // ══════════════════════════════════════════════
  async function toggleRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: mimeType });
        pendingAttachment = { blob, type: 'audio', mimeType, duration: recSeconds };
        showVoicePreview(blob, mimeType, recSeconds);
      };
      mediaRecorder.start(100);
      recSeconds = 0;
      document.getElementById('rec-bar').classList.add('show');
      document.getElementById('mic-btn').classList.add('recording');
      recInterval = setInterval(() => {
        recSeconds++;
        document.getElementById('rec-timer').textContent = fmtDur(recSeconds);
      }, 1000);
    } catch (err) {
      alert('Microphone access denied: ' + err.message);
    }
  }

  function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
    clearInterval(recInterval);
    document.getElementById('rec-bar').classList.remove('show');
    document.getElementById('mic-btn').classList.remove('recording');
  }

  function cancelRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.ondataavailable = null;
      mediaRecorder.onstop = null;
      mediaRecorder.stop();
    }
    clearInterval(recInterval);
    document.getElementById('rec-bar').classList.remove('show');
    document.getElementById('mic-btn').classList.remove('recording');
    audioChunks = [];
    pendingAttachment = null;
  }

  function showVoicePreview(blob, mimeType, duration) {
    const url = URL.createObjectURL(blob);
    const bar = document.getElementById('attach-preview-bar');
    const content = document.getElementById('ap-preview-content');
    content.innerHTML = `
      <i class="ti ti-microphone" style="font-size:24px;color:var(--threat);flex-shrink:0;"></i>
      <div class="ap-info">
        <div class="ap-name">Voice note · ${fmtDur(duration)}</div>
        <audio src="${url}" controls style="height:26px;max-width:180px;margin-top:2px;"></audio>
      </div>`;
    bar.classList.add('show');
  }

  // ══════════════════════════════════════════════
  //  CONTEXT MENU (long press / right click)
  // ══════════════════════════════════════════════
  function showCtxMenu(e, msgId, isSelf) {
    e.preventDefault();
    ctxTarget = msgId;
    const menu = document.getElementById('ctx-menu');
    const del  = document.getElementById('ctx-delete');
    del.style.display = isSelf === 'true' ? 'flex' : 'none';
    menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
    menu.style.top  = Math.min(e.clientY, window.innerHeight - 80) + 'px';
    menu.style.display = 'block';
  }

  function ctxCopy() {
    const row = document.querySelector(`[data-id="${ctxTarget}"]`);
    if (row) navigator.clipboard.writeText(row.dataset.msg || '');
    closeCtxMenu();
  }

  async function ctxDelete() {
    if (!ctxTarget) return;
    const r = await api('/api/dm/message/' + ctxTarget, { method: 'DELETE' });
    if (r.success) {
      const row = document.querySelector(`[data-id="${ctxTarget}"]`);
      if (row) {
        row.querySelector('.bubble').innerHTML = '<span class="msg-deleted">Message deleted</span>';
      }
    }
    closeCtxMenu();
  }

  function closeCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; ctxTarget = null; }

  // ══════════════════════════════════════════════
  //  IMAGE LIGHTBOX
  // ══════════════════════════════════════════════
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

  // ══════════════════════════════════════════════
  //  UTILITIES
  // ══════════════════════════════════════════════
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toUTCString().split(' ')[4].slice(0,5);
  }

  function formatDateLabel(iso) {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
    if (d.toDateString() === today.toDateString()) return 'TODAY';
    if (d.toDateString() === yesterday.toDateString()) return 'YESTERDAY';
    return d.toDateString().toUpperCase();
  }

  function fmtDur(secs) {
    const m = Math.floor(secs/60), s = secs % 60;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function escH(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Custom Voice Note Player ────────────────────────────────
  const _vnAudios = {};  // id -> Audio obj

  function vnToggle(id, url, totalDur) {
    // Stop other players
    Object.entries(_vnAudios).forEach(([k, a]) => {
      if (k !== id && !a.paused) {
        a.pause(); a.currentTime = 0;
        document.getElementById(k + '-icon').className = 'ti ti-player-play-filled';
        document.getElementById(k + '-btn').classList.remove('playing');
        _vnResetBars(k);
      }
    });

    if (!_vnAudios[id]) {
      const audio = new Audio(url);
      _vnAudios[id] = audio;
      audio.addEventListener('timeupdate', () => _vnProgress(id, audio, totalDur));
      audio.addEventListener('ended', () => {
        document.getElementById(id + '-icon').className = 'ti ti-player-play-filled';
        document.getElementById(id + '-btn').classList.remove('playing');
        document.getElementById(id + '-time').textContent = fmtDur(totalDur || Math.round(audio.duration) || 0);
        _vnResetBars(id);
      });
    }

    const audio = _vnAudios[id];
    const btn   = document.getElementById(id + '-btn');
    const icon  = document.getElementById(id + '-icon');

    if (audio.paused) {
      audio.play();
      icon.className = 'ti ti-player-pause-filled';
      btn.classList.add('playing');
    } else {
      audio.pause();
      icon.className = 'ti ti-player-play-filled';
      btn.classList.remove('playing');
    }
  }

  function _vnProgress(id, audio, totalDur) {
    const dur     = audio.duration || totalDur || 1;
    const ratio   = audio.currentTime / dur;
    const elapsed = Math.round(audio.currentTime);
    const timeEl  = document.getElementById(id + '-time');
    if (timeEl) timeEl.textContent = fmtDur(elapsed);

    const bars = document.querySelectorAll(`[id^="${id}-b"]`);
    const played = Math.floor(ratio * bars.length);
    bars.forEach((b, i) => {
      b.classList.remove('played','active');
      if (i < played)    b.classList.add('played');
      else if (i === played) b.classList.add('active');
    });
  }

  function _vnResetBars(id) {
    document.querySelectorAll(`[id^="${id}-b"]`).forEach(b => b.classList.remove('played','active'));
  }

  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--signal);">$1</a>');
  }

  // Close popups on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#emoji-picker') && !e.target.closest('#emoji-btn')) closeEmojiPicker();
    if (!e.target.closest('#attach-popup') && !e.target.closest('#attach-btn')) closeAttachMenu();
    if (!e.target.closest('#ctx-menu')) closeCtxMenu();
  });

  init();
  </script>
</body>
</html>
